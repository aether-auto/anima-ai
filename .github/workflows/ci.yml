name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            lockfile: requirements/lock-linux.txt
          - os: macos-latest
            lockfile: requirements/lock-macos.txt
          - os: windows-latest
            lockfile: requirements/lock-windows.txt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.lockfile }}
      - name: Install Linux rendering libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libegl1 libfontconfig1 libgl1
      - name: Install locked runtime dependencies
        run: python -m pip install --require-hashes -r "${{ matrix.lockfile }}"
      - name: Install package and quality tools
        run: |
          python -m pip install --no-deps -e .
          python -m pip install "fonttools==4.60.1" "mypy==1.19.1" "pytest==9.0.2" "PyYAML==6.0.3" "ruff==0.14.10"
      - name: Import heavy dependencies
        run: python -c "import skia, av, shapely, pyproj, topojson, numpy; print('heavy deps import OK')"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy --strict src/anima
      - name: Pytest
        run: pytest -q
