name: Goldens

# Deterministic golden-image regression: run entirely inside the pinned-digest
# golden container, generate every fixture's candidate, then compare against the
# committed baselines. On any mismatch, upload the actual/diff/report artifacts
# so an agent can inspect them. This workflow NEVER blesses baselines — updating
# a baseline is a deliberate, container-gated bless run outside CI.
#
# The container image is pinned by the real GHCR manifest digest (published
# 2026-07-15 via golden-container.yml, approved by Arnav). Bumping the golden
# environment = publish a new image, then update this digest and the
# container_ref in tests/golden/manifest.json together.

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  goldens:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/aether-auto/anima-golden@sha256:a977a80c2d5e2374c99c76d979a2fa2090dd0074406604f456bceca72f22009d
    steps:
      - uses: actions/checkout@v4

      # Re-point the editable install at the checked-out source so candidates
      # render from THIS revision's fixtures/renderer, not the image-baked copy.
      - name: Install checked-out package
        run: pip install --no-deps --no-build-isolation -e .

      - name: Generate candidate renders
        run: python -m anima.testing.goldens generate --all

      - name: Compare candidates against committed baselines
        run: python -m anima.testing.goldens compare --all

      - name: Upload actual / diff / report artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-diffs
          path: .golden-work/
          if-no-files-found: warn
